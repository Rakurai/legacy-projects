version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: mcp-legacy-og-docs
    environment:
      POSTGRES_DB: legacy_og_docs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "4010:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
