# ruff.toml — MCP server overrides (extends workspace baseline)

extend = "../../ruff.toml"

[lint]
ignore = [
    "ARG001",  # unused arguments — FastMCP tool parameter injection
    "B008",    # mutable default argument — FastAPI/FastMCP Depends()
    "PLR0911", # too many return statements — multi-stage resolution pipeline
    "PLR0912", # too many branches — tool handlers with legitimate branching
    "PLR0913", # too many arguments — FastAPI/FastMCP parameter injection
    "PLR0915", # too many statements — complex tool handlers
]

[lint.isort]
known-first-party = ["server", "build_helpers", "legacy_common"]

[lint.per-file-ignores]
"tests/**" = ["PLR2004"]
