[project]
name = "legacy-common"
version = "0.1.0"
description = "Shared modules for legacy MUD analysis tools"
requires-python = ">=3.14"
dependencies = [
    "jinja2>=3.1",
    "leidenalg>=0.10",
    "loguru>=0.7",
    "networkx>=3.2",
    "numpy>=2.0",
    "openai>=1.0",
    "pydantic>=2.0",
    "scikit-learn>=1.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["legacy_common"]
