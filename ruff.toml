# ruff.toml — workspace-wide strict baseline

line-length = 120
target-version = "py314"

[lint]
select = [
    "E",   # pycodestyle errors (semantic only — E4/E7/E9)
    "F",   # pyflakes
    "I",   # isort
    "B",   # bugbear
    "UP",  # pyupgrade
    "ANN", # type annotations
    "ARG", # unused arguments
    "PL",  # pylint
    "C4",  # flake8-comprehensions
    "N",   # pep8-naming
    "T20", # flake8-print
    "SIM", # flake8-simplify
    "RUF", # Ruff-specific rules
]
ignore = [
    # --- formatting territory (leave to ruff format) ---
    "E1",      # indentation
    "E2",      # whitespace
    "E3",      # blank lines
    "E501",    # line length handled by formatter
    # --- style preferences ---
    "ANN204",  # no return type annotation for __init__
    "UP006", "UP035", # prefer capitalized type annotations (List, Dict, Optional)
    "UP017",   # timezone.utc is fine
    "UP045",   # prefer Optional[T] over T | None
    "PLC0415", # imports inside functions are acceptable
    "F541",    # f-string without interpolation is fine
]
fixable = ["ALL"]
unfixable = []

exclude = [
    ".venv/**",
    ".scratch/**",
    "build/",
    "dist/",
    "__pycache__/",
    "tests/",
    "**/tests/**",
    "test_*.py",
    "*_test.py",
    "_archive/**",
]

[format]
skip-magic-trailing-comma = false

[lint.isort]
known-first-party = ["legacy_common", "doc_gen", "classify_fns"]
